# Optional Render Blueprint — có thể import từ Dashboard → New → Blueprint
# Hoặc tạo Web Service thủ công theo docs/deploy-free.md

services:
  - type: web
    name: expense-sharing-api
    runtime: docker
    rootDir: backend
    plan: free
    healthCheckPath: /api-docs
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: JAVA_OPTS
        value: -Xms128m -Xmx400m -XX:+UseSerialGC
